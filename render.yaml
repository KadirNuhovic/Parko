services:
  # Backend Web Service
  - type: web
    name: smart-mitrovica-backend
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  # Frontend Static Site (as web service)
  - type: web
    name: smart-mitrovica-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s frontend/build -l 10000
    envVars:
      - key: NODE_ENV
        value: production
